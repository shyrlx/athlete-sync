<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in | Athlete-Sync</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<main class="login-layout">
  <div class="login-wrap">
    <form class="gs-form" id="login-form" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-p" id="login-btn">Log in</button>
      <p id="form-error" style="display:none; color:red;"></p>
    </form>
  </div>
</main>
<script>
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('form-error');
    btn.disabled = true;
    
    const formData = new FormData(document.getElementById('login-form'));
    const res = await fetch('./process_login.php', { method: 'POST', body: formData });
    const data = await res.json();

    if (data.status === 'success') {
      window.location.href = './dashboard.php';
    } else {
      err.textContent = data.message;
      err.style.display = 'block';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
