<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in | Athlete-Sync</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="login-layout">
  <div class="login-wrap">
    <form class="gs-form" id="login-form" method="POST" action="process_login.php">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-p" id="login-btn">Log in</button>
      <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
      <p id="form-error" style="display:none; color:red;"></p>
    </form>
  </div>
</main>

</body>
</html>
